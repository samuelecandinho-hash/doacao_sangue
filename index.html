<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>doação</title>
</head>

<body>

    <main>
        <h2>Formulário de Doação</h2>

        <form id="docaosangue">
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Digite seu email" required>
            <label for="tel">Digite o seu telefone sem DDD (xxxxxxxx):</label>
            <input id="tel" name="tel" type="tel" minlength="8" maxlength="8" required pattern="[0-9]{4}[0-9]{4}" />
            <label for="idade">data de nascimento:</label>
            <input type="date" id="idade" required>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Qual é sua cidade" required>

            <label for="tipo">Tipo sanguíneo:</label>
            <select name="tipo" id="tipo" required>

                <option value="" disabled selected>Selecione</option>
                <option value="Ap"> A+</option>
                <option value="An">A-</option>
                <option value="Bp"> B+</option>
                <option value="An">B-</option>
                <option value="ABp"> AB+</option>
                <option value="ABn">AB-</option>
                <option value="Op"> O+</option>
                <option value="On">O-</option>

            </select>

            <label for="peso">peso(KG):</label>
            <input type="number" id="peso" placeholder="Digite seu peso" required>

            <label for="estado">estado(sem abreviação):</label>
            <input type="text" id="estado" placeholder="Qual é seu estado" required>

            <button type="submit">Enviar</button>
        </form>

    </main>
    <script src="script.js"></script>
</body>

</html>
